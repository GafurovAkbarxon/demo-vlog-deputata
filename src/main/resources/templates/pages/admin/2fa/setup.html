<!DOCTYPE html>
<html lang="ru"
      xmlns:th="http://www.thymeleaf.org" sec:authorize="hasRole('ADMIN')" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <title>Настройка 2FA</title>
    <meta name="robots" content="noindex, nofollow, noarchive">
    <meta name="googlebot" content="noindex, nofollow, noarchive">
    <th:block th:insert="fragments/assets/style_links :: css" />
    <link rel="stylesheet" th:href="@{/css/base.css}" />
    <link rel="stylesheet" th:href="@{/css/layouts/header.css}" />
    <link rel="stylesheet" th:href="@{/css/layouts/footer.css}" />


    <style>


        .card {
            border-radius: 18px;
        }

        .qr-box img {
            background: #fff;
            padding: 10px;
            border-radius: 12px;
        }

        .code-box {
            display: flex;
            justify-content: space-between;
            gap: 8px;
        }

        .code-box input {
            width: 48px;
            height: 56px;
            font-size: 1.5rem;
            text-align: center;
            font-weight: 600;
        }

        .shake {
            animation: shake 0.4s;
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }

        .timer {
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
<header th:replace="fragments/header :: header"></header>
<div th:replace="fragments/header :: search"></div>

<main>
<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow-lg p-4" style="max-width: 420px; width: 100%;">

        <!-- Заголовок -->
        <div class="text-center mb-4">
            <h3 class="fw-bold">Двухфакторная аутентификация</h3>
            <p class="text-muted mt-2">
                Дополнительная защита вашего аккаунта
            </p>
        </div>

        <!-- Ошибка -->
        <div th:if="${error}" id="errorBox"
             class="alert alert-danger text-center"
             th:text="${error}">
        </div>

        <!-- QR -->
        <div class="text-center mb-4 qr-box">
            <p class="mb-3">
                Отсканируйте QR-код в
                <strong>Google Authenticator</strong>
            </p>

            <img th:src="'data:image/png;base64,' + ${qrImage}"
                 alt="QR Code"
                 class="img-fluid"
                 style="max-width: 220px;"/>

            <small class="text-muted d-block mt-3">
                После сканирования введите код подтверждения
            </small>
        </div>

        <!-- Форма -->
        <form method="post" th:action="@{/ru/admin/auth/2fa/enable}" id="setupForm">

            <div class="code-box mb-3" id="codeBox">
                <input type="text" maxlength="1" inputmode="numeric">
                <input type="text" maxlength="1" inputmode="numeric">
                <input type="text" maxlength="1" inputmode="numeric">
                <input type="text" maxlength="1" inputmode="numeric">
                <input type="text" maxlength="1" inputmode="numeric">
                <input type="text" maxlength="1" inputmode="numeric">
            </div>

            <!-- скрытое поле -->
            <input type="hidden" name="code" id="code">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button class="btn btn-primary w-100 fw-semibold">
                Подтвердить и включить
            </button>
        </form>

        <!-- Таймер -->
        <div class="text-center mt-4 timer text-muted">
            Код обновится через <span id="countdown">30</span> сек
        </div>

    </div>
</div>
</main>
<footer th:replace="fragments/footer ::footer"></footer>




<th:block th:insert="fragments/assets/scrypt_links :: scrypt"/>

<script th:src="@{/js/layouts/header.js}"></script>
<script>
    const inputs = document.querySelectorAll('.code-box input');
    const hiddenInput = document.getElementById('code');
    const form = document.getElementById('setupForm');
    const errorBox = document.getElementById('errorBox');

    inputs[0].focus();

    inputs.forEach((input, index) => {
        input.addEventListener('input', () => {
            input.value = input.value.replace(/\D/, '');
            if (input.value && index < inputs.length - 1) {
                inputs[index + 1].focus();
            }
        });

        input.addEventListener('keydown', e => {
            if (e.key === 'Backspace' && !input.value && index > 0) {
                inputs[index - 1].focus();
            }
        });
    });

    form.addEventListener('submit', e => {
        let code = '';
        inputs.forEach(i => code += i.value);
        if (code.length !== 6) {
            e.preventDefault();
            shake();
            return;
        }
        hiddenInput.value = code;
    });

    function shake() {
        const box = document.getElementById('codeBox');
        box.classList.add('shake');
        setTimeout(() => box.classList.remove('shake'), 400);
    }

    if (errorBox) {
        shake();
    }

    // Таймер 30 сек
    let seconds = 30;
    const countdown = document.getElementById('countdown');

    setInterval(() => {
        seconds--;
        if (seconds <= 0) seconds = 30;
        countdown.textContent = seconds;
    }, 1000);
</script>

</body>
</html>
