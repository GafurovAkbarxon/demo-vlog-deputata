<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      >

<head>
    <title>Admin • Login Monitoring</title>

    <th:block th:insert="fragments/assets/style_links :: css" />

    <link rel="stylesheet" th:href="@{/css/base.css}" />
    <link rel="stylesheet" th:href="@{/css/layouts/header.css}" />
    <link rel="stylesheet" th:href="@{/css/layouts/footer.css}" />
    <style>
        body {
            background: linear-gradient(90deg,#1b2c55,#3d85a9,#63cac8,#b8edff);
            color: white;
        }

        .card {
            background: rgba(0,0,0,.25);
            border-radius: 18px;
        }

        th a {
            color: #f6c84c;
            text-decoration: none;
        }

        tr:hover {
            background: rgba(255,255,255,.08);
        }

        .suspicious {
            background-color: rgba(255,0,0,.25) !important;
        }

        .stat-box {
            background: rgba(0,0,0,.35);
            padding: 15px;
            border-radius: 14px;
            text-align: center;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(90deg, #1b2c55, #3d85a9, #63cac8, #b8edff);
            color: #fff;
        }

        .card {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 1rem;
            border: none;
        }

        .table {
            background: transparent !important;
            color: #fff;
            backdrop-filter: blur(6px);
            border-radius: 1rem;
            overflow: hidden;
        }

        .table td,
        .table th {
            background: transparent !important;
            color: #fff;
            border-color: rgba(255, 255, 255, .1);
        }

        .table thead {
            background: rgba(0, 0, 0, 0.35);
        }

        .table-hover tbody tr:hover {
            background: rgba(246, 200, 76, 0.15);
        }

        .pagination .page-link {
            background: rgba(0, 0, 0, .3);
            color: #fff;
            border: none;
        }

        .pagination .active .page-link {
            background: #f6c84c;
            color: #000;
        }

        .form-select,
        .form-control {
            background-color: rgba(0, 0, 0, 0.35);
            color: #fff;
            border: none;
            box-shadow: none !important;
        }

        .form-select option {
            background: white;
            color: black;
        }

        .sort-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: inherit;
            text-decoration: none;
            white-space: nowrap;
        }

        .sort-link:hover {
            text-decoration: underline;
        }

        .suspicious {
            background-color: rgba(255, 80, 80, .2) !important;
        }

        .stat-box {
            background: rgba(0,0,0,.35);
            padding: 15px;
            border-radius: 14px;
            text-align: center;
        }
        .form-control::placeholder { color: #fff; }
    </style>
</head>

<body class="container-fluid p-4">
<header th:replace="fragments/header :: header"></header>
<div th:replace="fragments/header :: search"></div>
<main class="mt-5">
<h2 class="mb-4"> Login Monitoring</h2>

<!-- ================== STATISTICS ================== -->
<div class="row mb-4 g-3">

    <div class="col-md-3">
        <div class="stat-box">
            <h4 th:text="${stats.total}">0</h4>
            <small>Total Attempts</small>
        </div>
    </div>

    <div class="col-md-3">
        <div class="stat-box">
            <h4 class="text-success" th:text="${stats.success}">0</h4>
            <small>Successful</small>
        </div>
    </div>

    <div class="col-md-3">
        <div class="stat-box">
            <h4 class="text-danger" th:text="${stats.fail}">0</h4>
            <small>Failed</small>
        </div>
    </div>

    <div class="col-md-3">
        <div class="stat-box">
            <h4 th:text="${stats.uniqueIps}">0</h4>
            <small>Unique IPs</small>
        </div>
    </div>

</div>

<!-- ================== FILTERS ================== -->
<form method="get" class="card p-3 mb-4">
    <div class="row g-2">

        <div class="col-md-2">
            <input class="form-control" name="username"
                   placeholder="Username"
                   th:value="${filter.username}">
        </div>

        <div class="col-md-2">
            <input class="form-control" name="ip"
                   placeholder="IP"
                   th:value="${filter.ip}">
        </div>

        <div class="col-md-2">
            <input type="datetime-local"
                   class="form-control"
                   name="from"
                   th:value="${filter.from}">
        </div>

        <div class="col-md-2">
            <input type="datetime-local"
                   class="form-control"
                   name="to"
                   th:value="${filter.to}">
        </div>

        <div class="col-md-2">
            <select class="form-select" name="success">
                <option value="">All</option>
                <option value="true" th:selected="${filter.success == true}">Success</option>
                <option value="false" th:selected="${filter.success == false}">Fail</option>
            </select>
        </div>

        <div class="col-md-2">
            <select class="form-select" name="browser">
                <option value="">All Browsers</option>
                <option th:each="b : ${browsers}"
                        th:value="${b}"
                        th:text="${b}"
                        th:selected="${filter.browser == b}">
                </option>
            </select>
        </div>

        <div class="col-md-2">
            <select class="form-select" name="os">
                <option value="">All OS</option>
                <option th:each="o : ${oses}"
                        th:value="${o}"
                        th:text="${o}"
                        th:selected="${filter.os == o}">
                </option>
            </select>
        </div>

        <div class="col-md-2">
            <select class="form-select" name="device">
                <option value="">All Devices</option>
                <option th:each="d : ${devices}"
                        th:value="${d}"
                        th:text="${d}"
                        th:selected="${filter.device == d}">
                </option>
            </select>
        </div>
        <div class="col-md-2">
            <input class="form-control" name="city"
                   placeholder="City"
                   th:value="${filter.city}">
        </div>
        <div class="col-md-2">
            <input class="form-control"
                   name="country"
                   placeholder="Country"
                   th:value="${filter.country}">
        </div>
        <div class="col-md-2">
            <input class="form-control"
                   name="asn"
                   type="number"
                   placeholder="ASN"
                   th:value="${filter.asn}">
        </div>

        <div class="col-md-2">
            <input class="form-control"
                   name="providerIp"
                   placeholder="ASN Provider"
                   th:value="${filter.providerIp}">
        </div>
        <div class="col-md-2">
            <button class="btn btn-warning w-100">Apply</button>
        </div>

    </div>
</form>

<!-- ================== TABLE ================== -->
<div class="card p-3">

    <table class="table  table-hover align-middle mb-0">

        <thead>
        <tr>
            <th th:replace="fragments/sort :: sort('Time', 'createdAt', ${filter})"></th>
            <th th:replace="fragments/sort :: sort('User', 'username', ${filter})"></th>
            <th th:replace="fragments/sort :: sort('IP', 'ip', ${filter})"></th>
            <th th:replace="fragments/sort :: sort('Status', 'success', ${filter})"></th>
            <th th:replace="fragments/sort :: sort('Provider', 'provider', ${filter})"></th>
            <th th:replace="fragments/sort :: sort('Browser', 'browser', ${filter})"></th>
            <th th:replace="fragments/sort :: sort('OS', 'os', ${filter})"></th>
            <th th:replace="fragments/sort :: sort('Device', 'device', ${filter})"></th>
            <th>Action</th>
            <th th:replace="fragments/sort :: sort('City', 'city', ${filter})"></th>
            <th th:replace="fragments/sort :: sort('Country', 'country', ${filter})"></th>
            <th th:replace="fragments/sort :: sort('ASN', 'asn', ${filter})"></th>
            <th th:replace="fragments/sort :: sort('ASN Provider', 'providerIp', ${filter})"></th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="e : ${page.content}"
            th:classappend="${#lists.contains(suspiciousIps, e.ip)} ? 'suspicious'">

            <td th:text="${#temporals.format(e.createdAt,'yyyy-MM-dd HH:mm:ss')}"></td>

            <td th:text="${e.username ?: '-'}"></td>

            <td>
                <strong th:text="${e.ip}"></strong>
            </td>

            <td>
                <span th:text="${e.success ? 'SUCCESS' : 'FAIL'}"
                      th:classappend="${e.success ? 'text-success' : 'text-danger'}">
                </span>
            </td>

            <td th:text="${e.provider}"></td>
            <td th:text="${e.browser ?: '-'}"></td>
            <td th:text="${e.os ?: '-'}"></td>
            <td th:text="${e.device ?: '-'}"></td>

            <td>
                <div th:if="${#lists.contains(blockedIps, e.ip)}">
                    <form th:action="@{/ru/admin/users/unblock-ip}" method="post">
                        <input type="hidden"
                               th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}" />
                        <input type="hidden" name="ip" th:value="${e.ip}">
                        <button class="btn btn-sm btn-success">
                            Unblock
                        </button>
                    </form>
                </div>

                <div th:unless="${#lists.contains(blockedIps, e.ip)}">
                    <form th:action="@{/ru/admin/users/block-ip}" method="post">
                        <input type="hidden"
                               th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}" />
                        <input type="hidden" name="ip" th:value="${e.ip}">
                        <button class="btn btn-sm btn-danger">
                            Block
                        </button>
                    </form>
                </div>
            </td>
            <td th:text="${e.city ?: '-'}"></td>
            <td th:text="${e.country ?: '-'}"></td>
            <td th:text="${e.asn ?: '-'}"></td>
            <td th:text="${e.providerIp ?: '-'}"></td>

        </tr>

        </tbody>
    </table>

</div>

<!-- ================== PAGINATION ================== -->
<nav class="mt-4">
    <ul class="pagination justify-content-center">

        <li class="page-item"
            th:classappend="${page.first}? 'disabled'">

            <a class="page-link"
               th:if="${!page.first}"
               th:href="@{/ru/admin/users/login-events(
    ${filter.toParams()},
    page=${page.number - 1}
)}">
                Prev
            </a>
        </li>

        <li class="page-item disabled">
            <span class="page-link"
                  th:text="${page.number + 1} + ' / ' + ${page.totalPages}">
            </span>
        </li>

        <li class="page-item"
            th:classappend="${page.last}? 'disabled'">

            <a class="page-link"
               th:if="${!page.last}"
               th:href="@{/ru/admin/users/login-events(
    ${filter.toParams()},
    page=${page.number + 1}
)}">
                Next
            </a>
        </li>

    </ul>
</nav>
</main>
<footer th:replace="fragments/footer ::footer"></footer>


<th:block th:insert="fragments/assets/scrypt_links :: scrypt"/>

<script th:src="@{/js/layouts/header.js}"></script>
</body>
</html>
