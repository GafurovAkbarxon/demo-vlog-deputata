<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:insert="fragments/assets/style_links :: css" />
    <title th:text="#{signInToSystem}"></title>

    <link rel="stylesheet" th:href="@{/css/base.css}" />
    <link rel="stylesheet" th:href="@{/css/layouts/header.css}" />
    <link rel="stylesheet" th:href="@{/css/layouts/footer.css}" />
    <link rel="stylesheet" th:href="@{/css/pages/public/login.css}" />

</head>
<body>
<header th:replace="fragments/header :: header"></header>
<div th:replace="fragments/header :: search"></div>

<main>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 class="mb-4 text-center" th:text="#{signIn}"></h2>

            <!-- Показ ошибок логина -->
            <div th:if="${param.error}" class="alert alert-danger">
                <span th:text="#{signInError}"></span>

                <span th:if="${param.left}">
                    <span th:text="#{signInLeft(${param.left[0]})}"></span>
                </span>
            </div>

            <div th:if="${param.logout}" class="alert alert-success" role="alert"
                 th:text="#{logoutSucess}">
            </div>

            <div th:if="${param.locked}" class="alert alert-danger"
                 th:text="#{sessionLocked}">
            </div>
            <div th:if="${param.expired}" class="alert alert-info"
                 th:text="#{sessionExpired}">
            </div>



            <a href="/oauth2/authorization/google"
               class="btn btn-light  w-100 mb-3 d-flex align-items-center justify-content-center gap-2 google-btn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
                     width="18" height="18">
                <span th:text="#{signInWithGoogle}"></span>

            </a>
            <form th:action="@{/auth/login}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="mb-3">
                    <label for="username" class="form-label"
                           th:text="#{login}">
                    </label>
                    <input type="text" class="form-control" id="username" name="username" required autofocus>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label"
                           th:text="#{password}">
                    </label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>
                <div class="form-check mb-3">
                    <label class="form-check-label" for="rememberMe"
                           th:text="#{rememberMe}">
                    </label>
                    <input class="form-check-input"
                           type="checkbox"
                           name="remember-me"
                           id="rememberMe">

                </div>
                <button type="submit" class="btn btn-primary w-100"
                    th:text="#{signIn}">
                </button>
            </form>

            <div class="mt-3 text-center">
                <a th:href="@{/auth/register}"
                   th:text="#{signUp}">
                </a>
            </div>

        </div>
    </div>


</div>
</main>

<footer th:replace="fragments/footer ::footer"></footer>


<th:block th:insert="fragments/assets/scrypt_links :: scrypt"/>
<script th:src="@{/js/layouts/header.js}"></script>

</body>
</html>
