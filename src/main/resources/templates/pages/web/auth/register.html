<!DOCTYPE html >
<html xmlns:th="http://www.thymeleaf.org">
<head >
    <th:block th:insert="fragments/assets/style_links :: css" />
    <title th:text="#{signUp}"></title>

    <link rel="stylesheet" th:href="@{/css/base.css}" />
    <link rel="stylesheet" th:href="@{/css/layouts/header.css}" />
    <link rel="stylesheet" th:href="@{/css/layouts/footer.css}" />
    <link rel="stylesheet" th:href="@{/css/pages/public/register.css}" />

</head>

<body>
<header th:replace="fragments/header :: header"></header>
<div th:replace="fragments/header :: search"></div>

<main>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 class="mb-4 text-center"
                th:text="#{signUp}">
            </h2>

            <div th:if="${error}" class="alert alert-danger"
                 th:text="${error}">
            </div>

            <form id="registerForm" th:action="@{/auth/register}" method="post">

                <!-- Honeypot -->
                <input type="text" name="website" class="hp-field" autocomplete="off">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>



                <!-- USERNAME -->
                <div class="mb-3">
                    <input name="username" class="form-control" th:placeholder="#{login}" autocomplete="username"
                           id="username" type="text"  required >

                    <div id="usernameError"
                         class="invalid-feedback">
                    </div>
                </div>

                <!-- PASSWORD -->
                <div class="mb-3">
                    <div class="input-group">
                        <input name="password" class="form-control" th:placeholder="#{password}" autocomplete="new-password"
                               id="password" type="password" required>
                        <button type="button" class="btn btn-outline-secondary"
                                onclick="togglePassword('password', this)">
                            <i class="bi bi-eye"></i>
                        </button>
                        <div id="passwordError"
                             class="invalid-feedback">
                        </div>
                    </div>
                </div>

                <!-- CONFIRM -->
                <div class="mb-3">
                    <div class="input-group">
                        <input name="passwordConfirm" class="form-control" th:placeholder="#{repeatPassword}" autocomplete="new-password"
                               id="passwordConfirm" type="password" required>
                        <button type="button" class="btn btn-outline-secondary"
                                onclick="togglePassword('passwordConfirm', this)">
                            <i class="bi bi-eye"></i>
                        </button>
                        <div id="confirmError"
                             class="invalid-feedback">
                        </div>
                    </div>
                </div>

                <!-- Invisible CAPTCHA USERNAME -->
                <div id="captchaUsernameContainer"></div>

                <!-- Invisible CAPTCHA REGISTER -->
                <div th:if="${captchaRequired}">

                    <div
                            class="cf-turnstile"
                            th:attr="data-sitekey=${turnstileSiteKey}"
                            data-theme="auto"
                            data-action="register"
                            data-callback="onTurnstileSuccess">
                    </div>



                    <input name="captchaToken" id="captchaToken" type="hidden">

                    <div class="text-danger small mt-2"
                         th:text="#{captchaText}">
                    </div>
                </div>



                <button id="submitBtn" class="btn btn-primary w-100 mt-3" disabled
                        th:text="#{signUp}">
                </button>

            </form>
        </div>
    </div>
</div>
</main>

<footer th:replace="fragments/footer ::footer"></footer>




<th:block th:insert="fragments/assets/scrypt_links :: scrypt"/>

<script th:src="@{/js/layouts/header.js}"></script>
<!-- Серверную подстановка данных в JS.-->
<script th:inline="javascript">
    const messages = {
        passwordSize: /*[[#{passwordSize}]]*/,
        passwordMismatch: /*[[#{passwordMismatch}]]*/,
        usernameSize: /*[[#{usernameSize}]]*/,
        usernamePattern: /*[[#{usernamePattern}]]*/
    };
    const siteKey = /*[[${turnstileSiteKey}]]*/ "";
</script>
<script th:src="@{/js/pages/public/register.js}"></script>
</body>
</html>
