<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml"
      th:with="lang=${#locale.language}">
<head>
    <title>Админ — Статьи</title>
    <th:block th:insert="fragments/assets/style_links :: css" />
    <link rel="stylesheet" th:href="@{/css/base.css}" />
    <link rel="stylesheet" th:href="@{/css/layouts/header.css}" />
    <link rel="stylesheet" th:href="@{/css/layouts/footer.css}" />
    <link rel="stylesheet" th:href="@{/css/pages/article/all.css}" />

</head>
<body>

<div class="container my-4">

    <header th:replace="fragments/header :: header"></header>
    <div th:replace="fragments/header :: search"></div>
    <h1 class="m-0" th:text="#{allArticles}"></h1>
    <div class="page-header-line mb-4">

        <div class="filters-card">

            <form th:action="@{/{lang}/article/all(lang=${lang})}" method="get" class="filters-form">

                <!-- Поиск -->
                <div class="filter-group search-group">
                    <i class="bi bi-search"></i>
                    <input type="text"
                           name="filterTitle"
                           class="form-control"
                           th:placeholder="#{searchByTitle}"
                           th:value="${filterTitle}">
                </div>

                <!-- Категория -->
                <div class="filter-group">
                    <select name="filterCategory" class="form-select">
                        <option value="" th:text="#{allCategories}"></option>
                        <option th:each="cat : ${categories}"
                                th:value="${cat}"
                                th:text="#{${cat.langKey}}"
                                th:selected="${cat == filterCategory}">
                        </option>
                    </select>
                </div>
                <div class="filter-group tag-group">
                    <i class="bi bi-hash"></i>
                    <input type="text"
                           name="filterTag"
                           class="form-control"
                           placeholder="#tag"
                           th:value="${filterTag}">
                </div>
                <!-- Сортировка -->
                <div class="filter-group">
                    <select name="sort" class="form-select">
                        <option value="" th:text="#{sortBy}"></option>
                        <option th:each="sort : ${allSorting}"
                                th:value="${sort}"
                                th:text="#{${sort.langKey}}">
                        </option>
                    </select>
                </div>

                <!-- Кнопка -->
                <button class="btn btn-warning filter-btn-main" type="submit"
                        th:text="#{toFilter}"></button>

            </form>
        </div>
        <div sec:authorize="hasRole('ADMIN')" class="admin-actions">
            <a href="/ru/admin/article/create" class="btn btn-primary px-4 mb-2"
               th:text="#{createArticle}"></a>

            <a href="/ru/admin/users" class="btn btn-primary px-4 mb-2"
               th:text="#{manageUsers}"></a>

            <a href="/ru/admin/auth/2fa/setup" class="btn btn-primary px-4"
               th:text="#{qrFor2FA}"></a>
        </div>

    </div>



    <!-- Список статей -->
    <div class="row mt-4" id="articlesContainer">
        <div class="col-6 col-md-4 col-lg-3  d-flex" th:each="article : ${articles}">
            <div class="article-card mb-3 mt-3">

                <a th:href="@{/{lang}/article/{slug}(lang=${lang}, slug=${article.slug})}" class="article-link">
                    <img th:src="@{/uploads/images/{name}(name=${article.coverName})}"
                         th:alt="${article.altCover}"
                         decoding="async"
                         loading="lazy"
                         class="article-cover"
                         th:style="'object-fit: cover; object-position: ' + ${article.coverPosition} + ';'">

                    <div class="article-overlay"></div>

                    <h5 class="article-title" th:text="${article.title}"></h5>
                </a>

                <div sec:authorize="hasRole('ADMIN')"  class="article-actions">

                    <a th:href="@{/ru/admin/article/edit/{slug}(slug=${article.slug},contentLang=${article.language.code})}"
                       class="btn-edit" th:title="#{edit}"> <i class="bi bi-pencil-fill"></i>
                    </a>

                    <form th:action="@{/ru/admin/article/delete/{id}( id=${article.articleId})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="btn-delete" th:title="#{delete}"
                                onclick="return confirm('Удалить статью?')">
                            <i class="bi bi-trash-fill"></i>
                        </button>
                    </form>
                </div>
                <div sec:authorize="hasRole('ADMIN')" class="translation-actions">

                    <!-- RU -->
                    <a th:if="${article.alternateSlugs['ru'] != null}"
                       th:href="@{/ru/article/{slug}(slug=${article.alternateSlugs['ru']})}"
                       class="lang-btn lang-active">RU</a>

                    <a th:if="${article.alternateSlugs['ru'] == null}"
                       th:href="@{/ru/admin/article/{id}/create-translation(lang='ru',id=${article.articleId})}"
                       class="lang-btn lang-missing">RU</a>

                    <!-- UZ -->
                    <a th:if="${article.alternateSlugs['uz'] != null}"
                       th:href="@{/uz/article/{slug}(slug=${article.alternateSlugs['uz']})}"
                       class="lang-btn lang-active">UZ</a>

                    <a th:if="${article.alternateSlugs['uz'] == null}"
                       th:href="@{/ru/admin/article/{id}/create-translation(lang='uz',id=${article.articleId})}"
                       class="lang-btn lang-missing">UZ</a>

                </div>
            </div>
        </div>
    </div>






</div>
<footer th:replace="fragments/footer ::footer"></footer>
<th:block th:insert="fragments/assets/scrypt_links :: scrypt"/>



<script th:src="@{/js/layouts/header.js}"></script>
<script>
    // $(document).ready(function () {
    //     $('#filterLanguage,  #filterTag,#sort').select2({width: '100%'});
    // });
</script>

</body>
</html>
