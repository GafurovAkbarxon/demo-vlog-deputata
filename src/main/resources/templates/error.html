<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${status} + ' Error'">Error</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: radial-gradient(circle at 30% 30%, #1e1e2f, #0f0f1a);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        .card {
            backdrop-filter: blur(15px);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 60px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
            animation: fadeIn 0.5s ease;
        }

        .status {
            font-size: 120px;
            font-weight: bold;
            position: relative;
            animation: glitch 1s infinite;
        }

        .message {
            font-size: 20px;
            margin: 20px 0;
            opacity: 0.8;
        }

        .btn {
            margin-top: 30px;
            padding: 12px 30px;
            border-radius: 50px;
            background: linear-gradient(45deg, #6a5acd, #00c6ff);
            border: none;
            color: white;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px #00c6ff;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: scale(0.9);}
            to {opacity: 1; transform: scale(1);}
        }

        @keyframes glitch {
            0% { text-shadow: 2px 2px #ff00c8; }
            20% { text-shadow: -2px -2px #00fff9; }
            40% { text-shadow: 2px -2px #ff00c8; }
            60% { text-shadow: -2px 2px #00fff9; }
            80% { text-shadow: 0px 0px transparent; }
            100% { text-shadow: 2px 2px #ff00c8; }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="status" th:text="${status}">500</div>

    <div class="message"
         th:text="${status == 404 ? 'Страница не найдена' :
                  (status == 400 ? 'Неверный запрос' :
                  (status == 500 ? 'Ошибка сервера' : 'Произошла ошибка'))}">
        Ошибка
    </div>

    <div th:text="${message} ?: 'Попробуйте позже'"></div>

    <a th:href="@{${@environment.getProperty('site.baseUrl')}}" class="btn">
        Вернуться на главную
    </a>
</div>

</body>
</html>
