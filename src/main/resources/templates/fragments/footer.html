<footer th:fragment="footer" th:with="lang=${#locale.language}" class="glass-footer mt-5"
        xmlns:th="http://www.thymeleaf.org">

    <div class="container-fluid py-4">
        <div class="row align-items-start gy-4">

            <!-- LEFT COLUMN -->
            <div class="col-md-6 d-flex flex-column gap-2">

                <!-- Logo -->
                <a th:href="@{/{lang}/home(lang=${lang})}" class="footer-logo">
                    Vlog <span>Deputata</span>
                </a>

                <!-- Instagram -->
                <a href="https://instagram.com"
                   target="_blank"
                   class="footer-social">
                    <i class="bi bi-instagram"></i>
                    Instagram
                </a>

                <!-- Divider -->
                <div class="footer-divider"></div>

                <!-- Credits -->
                <div class="footer-meta" >
                    Developed by <span>WhiteProject</span>
                </div>
            </div>

            <!-- RIGHT COLUMN -->
            <div class="col-md-6 text-md-end d-flex align-items-end justify-content-md-end">
                <div class="footer-location" th:text="#{ourAdress}">
                    Uzbekistan, Tashkent
                </div>
            </div>

        </div>
    </div>
</footer>
