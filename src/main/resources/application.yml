server:
  compression:                        #быстрее загрузка
    enabled: true
    min-response-size: 1024
    mime-types: >
      text/html,
      text/xml,
      text/plain,
      text/css,
      text/javascript,
      application/javascript,
      application/json,
      application/xml

  error:  #показывать мой error html
    whitelabel:
      enabled: false


spring:
  profiles:
    active: dev
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    session:
      timeout: 30m                    #сессия истекает через 30м бездействия
    multipart:                        #максимальный размер загрузки файла.
      max-file-size: 50MB
      max-request-size: 50MB
  application:
    name: VlogDeputataRB
app:
  storage:
    root: ${APP_STORAGE_ROOT:./storage}
#  web:
#    resources:
#      static-locations: classpath:/static/,file:uploads/  #Разрешает отдавать файлы из папки uploads/
